<!doctype html>
<html lang="fr">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Robot ESP32 S3 ZERO — Schéma de câblage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

    padding: 20px;
  }
  .container {

    width: 100%;
  }
  .header {
    display: flex;
    justify-content: space-between;

  svg { width: 100%; height: auto; display: block; border-radius: 8px; }

<div class="container">
  <div class="header">
    <h1>🤖 Robot ESP32 S3 ZERO — Schéma de câblage</h1>
    <span>Généré par Bob</span>
  </div>

<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" style="background:#0d1117;">
  <defs>
    <filter id="glow-warn"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f85149"/></marker>
    <marker id="arr-gry" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/></marker>
    <marker id="arr-blu" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/></marker>
    <marker id="arr-orn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d29922"/></marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/></marker>
    <marker id="arr-ppl" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#bc8cff"/></marker>

    <radialGradient id="bg-grad" cx="40%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" fill="url(#bg-grad)" rx="4"/>

  <!-- Grille subtile -->
  <g opacity="0.04" stroke="#58a6ff" stroke-width="0.3">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="1000" height="720" fill="url(#grid)"/>
  </g>

  <!-- ============================================================ -->
  <!-- WIRES (drawn first so they sit behind components)             -->
  <!-- ============================================================ -->

  <!-- HC-SR04 → ESP32 -->
  <path d="M220,530 L220,440 L340,440 L340,370" stroke="#d29922" stroke-width="1.5" fill="none" marker-end="url(#arr-orn)"/>
  <path d="M280,530 L280,440 L380,440 L380,370" stroke="#d29922" stroke-width="1.5" fill="none" marker-end="url(#arr-orn)"/>

  <text x="310" y="520" fill="#d29922" font-size="10">TRIG → GPIO5</text>

  <!-- HC-SR04 VCC/GND -->
  <path d="M160,530 L160,560 L410,560 L410,390" stroke="#f85149" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>
  <path d="M250,540 L250,570 L390,570 L390,400" stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#arr-gry)"/>

  <path d="M280,135 L280,200 L420,200 L420,360" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#arr-blu)"/>

  <text x="330" y="198" fill="#58a6ff" font-size="10">SCL → GPIO22</text>

  <text x="490" y="240" fill="#d29922" font-size="10">IO signal → GPIO12</text>

  <!-- Piezo VCC/GND -->
  <path d="M520,135 L530,135 L530,380 L430,380" stroke="#f85149" stroke-width="1.5" fill="none"/>
  <path d="M520,175 L550,175 L550,400 L430,400" stroke="#8b949e" stroke-width="1.5" fill="none"/>

  <path d="M750,110 L750,80 L170,80 L170,390" stroke="#f85149" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <path d="M660,340 L600,340 L600,390" stroke="#bc8cff" stroke-width="1.5" fill="none" marker-end="url(#arr-ppl)"/>

  <path d="M660,400 L560,400 L560,430" stroke="#bc8cff" stroke-width="1.5" fill="none" marker-end="url(#arr-ppl)"/>

  <text x="555" y="336" fill="#bc8cff" font-size="10">IN2 → GPIO14</text>
  <text x="555" y="366" fill="#bc8cff" font-size="10">IN3 → GPIO27</text>
  <text x="555" y="396" fill="#bc8cff" font-size="10">IN4 → GPIO26</text>

  <path d="M660,430 L660,450 L520,450 L520,440" stroke="#8b949e" stroke-width="1.5" fill="none"/>

  <text x="60" y="322" fill="#f85149" font-size="9">3.3V</text>

  <!-- ============================================================ -->

    <rect x="460" y="140" width="80" height="48" rx="30" fill="#1c2333" stroke="#d29922" stroke-width="1.5"/>

    <text x="500" y="175" fill="#8b949e" font-size="9" text-anchor="middle">🔊 Buzzer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="95" width="120" height="55" rx="6" fill="#1c2333" stroke="#3fb950" stroke-width="1.5"/>

    <text x="760" y="137" fill="#8b949e" font-size="9" text-anchor="middle">Chargeur Li-Ion</text>

  <g filter="url(#shadow)">

    <text x="760" y="190" fill="#f85149" font-size="11" font-weight="600" text-anchor="middle">BAT + / -</text>

  <line x1="760" y1="150" x2="760" y2="168" stroke="#f85149" stroke-width="1.2" stroke-dasharray="4 2"/>

    <rect x="660" y="280" width="130" height="55" rx="6" fill="#1c2333" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="725" y="304" fill="#bc8cff" font-size="12" font-weight="700" text-anchor="middle">MX1508</text>
    <text x="725" y="320" fill="#8b949e" font-size="9" text-anchor="middle">Pont en H x2</text>
  </g>
  <!-- Label Moteur drivers inside -->
  <rect x="660" y="340" width="130" height="18" rx="3" fill="#bc8cff" opacity="0.08"/>
  <text x="725" y="352" fill="#8b949e" font-size="8" text-anchor="middle">IN1 IN2 IN3 IN4  |  VCC GND</text>

  <!-- Moteur A -->
  <g filter="url(#shadow)">
    <rect x="840" y="295" width="90" height="40" rx="20" fill="#1c2333" stroke="#3fb950" stroke-width="1.5"/>

  <!-- Moteur B -->
  <g filter="url(#shadow)">
    <rect x="840" y="375" width="90" height="40" rx="20" fill="#1c2333" stroke="#3fb950" stroke-width="1.5"/>

    <text x="885" y="399" fill="#3fb950" font-size="11" font-weight="600" text-anchor="middle">Moteur B</text>
  </g>

    <rect x="60" y="340" width="50" height="48" rx="24" fill="#1c2333" stroke="#d29922" stroke-width="1.5"/>

    <text x="85" y="374" fill="#8b949e" font-size="8" text-anchor="middle">Bouton</text>

    <text x="84" y="313" fill="#8b949e" font-size="9" text-anchor="middle">10K Ω</text>
  </g>

  <!-- ============================================================ -->
  <!-- ALIMENTATION / POWER RAILS                                   -->
  <!-- ============================================================ -->

  <!-- Power rail -->
  <line x1="120" y1="400" x2="440" y2="400" stroke="#f85149" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="140" y="394" fill="#f85149" font-size="8">3.3V rail</text>
  <line x1="120" y1="410" x2="440" y2="410" stroke="#8b949e" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="140" y="424" fill="#8b949e" font-size="8">GND rail</text>

  <!-- ============================================================ -->

  <!-- ============================================================ -->

  <text x="700" y="678" fill="#484f58" font-size="9">

    <text x="10" y="34" fill="#8b949e" font-size="9">GPIO4  → HC-SR04 ECHO</text>
